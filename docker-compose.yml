version: "3.9"

services:

  db:
    image: postgres:15
    container_name: logsleuth_db

    environment:
      POSTGRES_DB: log_engine
      POSTGRES_USER: log_user
      POSTGRES_PASSWORD: simple123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U log_user -d log_engine"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: logsleuth_redis

    ports:
      - "6379:6379"

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
